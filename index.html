<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul STEAM Project — Գտիր քո բույրը</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght=0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f0ea 0%, #e9e0d5 100%);
            --text-main: #2c2621;
            --text-muted: #7a6f64;
            --accent: #b39b82;
            --accent-light: #fbf9f6;
            --card-shadow: 0 20px 50px rgba(44, 38, 33, 0.05);
            --border-color: rgba(179, 155, 130, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .quiz-wrapper {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--card-shadow);
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--text-main);
            line-height: 1.3;
            font-style: italic;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .timeline-container {
            width: 100%;
            height: 3px;
            background: rgba(44, 38, 33, 0.05);
            margin-bottom: 40px;
            border-radius: 10px;
            overflow: hidden;
        }

        .timeline-progress {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-box {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 400;
            color: var(--text-main);
            text-align: center;
            min-height: 60px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-item {
            background: #ffffff;
            border: 1px solid var(--border-color);
            padding: 18px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text-main);
            text-align: left;
            line-height: 1.5;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 4px 10px rgba(44, 38, 33, 0.01);
        }

        .option-item:hover {
            border-color: var(--accent);
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(179, 155, 130, 0.12);
        }

        .result-screen {
            display: none;
            text-align: center;
            animation: eleganceFade 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .result-badge {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .perfume-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--text-main);
            margin-bottom: 24px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .perfume-description {
            font-size: 15px;
            line-height: 1.8;
            color: #4a423a;
            margin-bottom: 40px;
            padding: 0 10px;
            font-weight: 300;
        }

        .action-button {
            background: var(--text-main);
            color: #ffffff;
            border: none;
            padding: 16px 36px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(44, 38, 33, 0.15);
        }

        .action-button:hover {
            background: #423a32;
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(44, 38, 33, 0.2);
        }

        @keyframes eleganceFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <div id="quiz-flow">
        <div class="brand-header">
            <div class="brand-logo">Soul STEAM Project</div>
            <h1 id="header-title">Բացահայտիր քո բույրը</h1>
            <div class="subtitle" id="step-subtitle">Ընտրիր քեզ հոգեհարազատ տարբերակները</div>
        </div>
        <div class="timeline-container"><div class="timeline-progress" id="timeline-indicator"></div></div>
        <div class="question-box" id="question-render">Բեռնվում է...</div>
        <div class="options-list" id="options-render"></div>
    </div>

    <div id="result-flow" class="result-screen">
        <div class="brand-logo" style="margin-bottom: 30px;">Soul STEAM Project</div>
        <div class="result-badge">Ձեր անհատական ընտրությունը</div>
        <h2 class="perfume-title" id="final-perfume-name">Lumina Bloom</h2>
        <div class="perfume-description" id="final-perfume-desc">Նկարագրություն</div>
        <button class="action-button" onclick="resetQuiz()">Փորձել նորից</button>
    </div>
</div>
