<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Գտիր քո բույրը</title>
    <link href="https://fonts.googleapis.com/css2?family=Mardoto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcfbfa;
            --text-color: #3a3530;
            --accent-color: #c4b29d;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Mardoto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            text-align: center;
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 14px;
            color: #8c8275;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 2px;
            width: 100%;
            background-color: #eee;
            margin-bottom: 30px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .question {
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: 400;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: transparent;
            border: 1px solid #e6e1da;
            padding: 16px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-color);
            text-align: left;
            transition: all 0.25s ease;
        }

        .option-btn:hover {
            border-color: var(--accent-color);
            background-color: #faf8f5;
            transform: translateY(-1px);
        }

        .result {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }

        .result h2 {
            font-size: 28px;
            color: var(--text-color);
            margin-bottom: 15px;
            font-weight: 500;
        }

        .result-type {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .result-desc {
            font-size: 16px;
            line-height: 1.6;
            color: #5c554e;
            margin-bottom: 30px;
        }

        .restart-btn {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }

        .restart-btn:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-section">
        <h1 id="title">Բացահայտիր քո բույրը</h1>
        <div class="subtitle" id="subtitle">Ընտրիր քեզ հոգեհարազատ տարբերակները</div>
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div class="question" id="question-text">Բեռնվում է...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-section" class="result">
        <div class="result-type">Քո անհատական դեղատոմսը</div>
        <h2 id="perfume-name">Lumina Bloom</h2>
        <div class="result-desc" id="perfume-desc">Նկարագրություն</div>
        <button class="restart-btn" onclick="restartQuiz()">ԱՆՑՆԵԼ ՆՈՐԻՑ</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Ինչպե՞ս կուզես անցկացնել այսօրվա երեկոն.", id: 1, type: "normal", keys: ["Ա", "Բ", "Գ", "Դ"], options: ["Լեցուն ժպիտներով, վառ գույներով և դրական էներգիայով։", "Լռության մեջ, տաք թեյով և լիակատար հանդարտությամբ։", "Մաքուր օդին երկար զբոսնելով՝ առանց որևէ շտապողականության։", "Հարմարավետ մի անկյունում՝ սիրելի գրքի հետ առանձնացած։"] },
        { q: "Եթե հիմա ընտրեիր քեզ համար ամենահաճելի հյուսվածքը (տեքստուրան), ո՞րը կլիներ դա.", id: 2, type: "normal", keys: ["Ա", "Բ", "Գ", "Դ"], options: ["Մետաքսե թեթև և օդային շարֆ։", "Փափուկ և տաք բրդյա ծածկոց։", "Զով, թարմացնող ջրի կաթիլներ։", "Հին, ամուր գրքի թավշյա կազմ։"] },
        { q: "Ո՞ր մեղեդին է հիմա ամենամոտ քո ներաշխարհին.", id: 3, type: "normal", keys: ["Ա", "Բ", "Գ", "Դ"], options: ["Աշխույժ, ռիթմիկ և ոգեշնչող երաժշտություն։", "Դաշնամուրի դանդաղ և հանգստացնող նոտաներ։", "Բնության ձայները՝ քամու շրշյուն կամ անձրևի կաթիլներ։", "Խորը, դասական կամ ջազային գործիքային կատարում։"] },
        { q: "Ի՞նչը քեզ ամենից արագ կպարգևի թեթևության զգացում.", id: 4, type: "normal", keys: ["Ա", "Բ", "Գ", "Դ"], options: ["Ընկերների հետ անկեղծ զրույցն ու ծիծաղը։", "Արտաքին աշխարհից մեկ ժամով ամբողջությամբ անջատվելը։", "Բարձունքի վրա լիաթոք ու խորը շունչ քաշելը։", "Մտքերը հստակեցնելն ու ներքին հավասարակշռություն գտնելը։"] },
        { q: "Ի՞նչ կուզես, որ քո օծանելիքը պատմի քո մասին այսօր.", id: 5, type: "normal", keys: ["Ա", "Բ", "Գ", "Դ"], options: ["«Ես պատրաստ եմ նոր բացահայտումների և վառ պահերի»։", "«Ես խաղաղության և ներդաշնակության մեջ եմ ինքս ինձ հետ»։", "«Ես սիրում եմ ազատություն, տարածություն և բնականություն»։", "«Ես ունեմ ներքին ուժ, հաստատակամություն և խորություն»։"] }
    ];

    const tieBreakers = {
        "ԱԲ": { q: "Ի՞նչն է քեզ հենց այս պահին ավելի հոգեհարազատ.", keys: ["Ա", "Բ"], options: ["Զգացմունքների վառ զարթոնքն ու թարմությունը", "Մեղմ անդորրն ու մտքի խաղաղությունը"] },
        "ԳԴ": { q: "Ի՞նչն է քեզ հենց այս պահին ավելի հոգեհարազատ.", keys: ["Գ", "Դ"], options: ["Թեթևությունը, թռիչքի զգացումն ու բաց տարածությունը", "Ներքին կայունությունը, հանգստությունն ու հաստատուն հիմքը"] },
        "ԱԳ": { q: "Ի՞նչն է քեզ հենց այս պահին ավելի հոգեհարազատ.", keys: ["Ա", "Գ"], options: ["Արևոտ ծաղիկների կենսախնդիր էներգիան", "Բնության մաքուր, զով և ազատ շունչը"] },
        "ԲԴ": { q: "Ի՞նչն է քեզ հենց այս պահին ավելի հոգեհարազատ.", keys: ["Բ", "Դ"], options: ["Նուրբ, ոչ ծանր, հարմարավետ միջավայրը", "Իմաստուն, մտածկոտ և ինքնավստահ ներաշխարհը"] }
    };

    const resultsData = {
        "Ա": { name: "Lumina Bloom 🌸", desc: "Ծաղկային զարթոնք: Այս բույրը բարձրացնում է տրամադրությունը, արթնացնում կենսախնդրությունն ու պարգևում վառ, դրական էներգիա: Այն կատարյալ է նոր բացահայտումների համար:" },
        "Բ": { name: "Serene Glow 🌙", desc: "Մեղմ անդորր: Նուրբ նոտաներ, որոնք օգնում են թուլանալ, հանգստացնում են հոգին և պարգևում ներդաշնակություն ու բացարձակ խաղաղություն:" },
        "Գ": { name: "Other Breathe 🌬️", desc: "Ազատ շունչ: Տալիս է թեթևություն, օգնում է ազատվել ավելորդ մտավոր ծանրությունից, զգալ բնության զովությունն ու լիաթոք շնչել:" },
        "Դ": { name: "Novel Cedar 🌲", desc: "Ազնվական կայունություն: Փայտային խորը նոտաներ, որոնք օգնում են հստակեցնել մտքերը, կենտրոնանալ և հաղորդում են ներքին ուժ ու ինքնավստահություն:" }
    };

    let currentQuestionIndex = 0;
    let scores = { "Ա": 0, "Բ": 0, "Գ": 0, "Դ": 0 };
    let isTieBreaker = false;

    function initQuiz() {
        currentQuestionIndex = 0;
        scores = { "Ա": 0, "Բ": 0, "Գ": 0, "Դ": 0 };
        isTieBreaker = false;
        document.getElementById("quiz-section").style.display = "block";
        document.getElementById("result-section").style.display = "none";
        showQuestion();
    }

    function showQuestion() {
        let currentQuestion;
        let totalSteps = questions.length;
        
        if (!isTieBreaker) {
            currentQuestion = questions[currentQuestionIndex];
            let progressPercent = (currentQuestionIndex / totalSteps) * 100;
            document.getElementById("progress").style.width = progressPercent + "%";
        } else {
            currentQuestion = isTieBreaker;
            document.getElementById("progress").style.width = "100%";
        }

        document.getElementById("question-text").innerText = currentQuestion.q;
        const container = document.getElementById("options-container");
        container.innerHTML = "";

        currentQuestion.options.forEach((option, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = option;
            btn.onclick = () => handleAnswer(currentQuestion.keys[index]);
            container.appendChild(btn);
        });
    }

    function handleAnswer(key) {
        scores[key]++;
        
        if (!isTieBreaker) {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                checkResult();
            }
        } else {
            showFinalResult(key);
        }
    }

    function checkResult() {
        let maxScore = 0;
        let winners = [];

        for (let key in scores) {
            if (scores[key] > maxScore) {
                maxScore = scores[key];
                winners = [key];
            } else if (scores[key] === maxScore) {
                winners.push(key);
            }
        }

        if (winners.length === 1) {
            showFinalResult(winners[0]);
        } else {
            // Որոշիչ հարցի ընտրություն՝ ըստ հավասար տառերի զույգի
            let pair = winners.join("");
            if (tieBreakers[pair]) {
                isTieBreaker = tieBreakers[pair];
            } else if (tieBreakers[pair.split("").reverse().join("")]) {
                isTieBreaker = tieBreakers[pair.split("").reverse().join("")];
            } else {
                // Եթե 3 հավասար տառ կա (հազվադեպ), ընտրում է առաջինը
                isTieBreaker = tieBreakers["ԱԲ"]; 
            }
            showQuestion();
        }
    }

    function showFinalResult(winnerKey) {
        document.getElementById("quiz-section").style.display = "none";
        document.getElementById("result-section").style.display = "block";
        
        const result = resultsData[winnerKey];
        document.getElementById("perfume-name").innerText = result.name;
        document.getElementById("perfume-desc").innerText = result.desc;
    }

    function restartQuiz() {
        initQuiz();
    }

    window.onload = initQuiz;
</script>
</body>
</html>
